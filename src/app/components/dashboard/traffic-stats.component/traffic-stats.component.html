<section class="traffic-stats">
  <mat-card>
    <h3>Average Speed</h3>
    <p>{{ trafficStats.avgSpeed }} mph</p>
  </mat-card>
  <mat-card>
    <h3>Traffic Volume</h3>
    <p>{{ trafficStats.volume }} / hr</p>
  </mat-card>
  <mat-card>
    <h3>Active Alerts</h3>
    <p>{{ trafficStats.alerts }}</p>
  </mat-card>
  <mat-card>
    <h3>Congestion Index</h3>
    <p>{{ trafficStats.congestionIndex }}</p>
  </mat-card>
</section>
